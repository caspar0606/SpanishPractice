<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spanish Practice</title>
    <link rel="stylesheet" href="/styles.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600&display=swap"
    />
  </head>
  <body>
    <main>
      <h1>Spanish Practice</h1>
      <p class="subtitle">Log in, choose an exercise, then practice.</p>

      <div id="status" class="info" role="status" aria-live="polite"></div>

      <section id="panel-login" class="panel" aria-labelledby="login-heading">
        <h2 id="login-heading">Log in</h2>
        <form id="form-login">
          <label for="login-username">Username</label>
          <input
            id="login-username"
            name="username"
            type="text"
            autocomplete="username"
            required
          />

          <label for="login-key">Access code</label>
          <input
            id="login-key"
            name="key"
            type="password"
            autocomplete="current-password"
            required
          />

          <div class="row">
            <label
              ><input type="checkbox" id="login-new" name="new" /> New user
              (first time)</label
            >
          </div>

          <button type="submit">Continue</button>
        </form>
      </section>

      <section id="panel-exercise" class="panel hidden" aria-labelledby="exercise-heading">
        <h2 id="exercise-heading">Choose exercise</h2>
        <p class="user-pill" id="exercise-user-label" hidden></p>
        <form id="form-exercise">
          <label for="ex-type">Type</label>
          <select id="ex-type" name="type" required>
            <option value="writing">Writing</option>
            <option value="reading">Reading</option>
            <option value="drills">Drills</option>
          </select>

          <label for="ex-difficulty">Difficulty</label>
          <select id="ex-difficulty" name="difficulty" required>
            <option value="beginner">Beginner</option>
            <option value="novice">Novice</option>
            <option value="intermediate">Intermediate</option>
          </select>

          <fieldset style="border: none; padding: 0; margin: 0.75rem 0 0">
            <legend class="sr-only">Focus style</legend>
            <div class="row">
              <label
                ><input type="radio" name="style" value="weaknesses" checked />
                Focus on weaknesses</label
              >
              <label
                ><input type="radio" name="style" value="preferences" /> My
                preferences</label
              >
            </div>
          </fieldset>

          <div id="preferences-box" class="hidden">
            <p style="margin: 0.75rem 0 0.25rem; color: var(--muted); font-size: 0.9rem">
              Pick at least one area when using preferences.
            </p>
            <label>Tenses</label>
            <div id="pref-tenses" class="check-grid"></div>
            <label>Grammar</label>
            <div id="pref-grammar" class="check-grid"></div>
            <label>Topics</label>
            <div id="pref-topics" class="check-grid"></div>
          </div>

          <button type="submit">Start exercise</button>
          <button type="button" class="secondary" id="btn-logout">Log out</button>
          <button type="button" class="secondary" id="btn-progress">My progress</button>
        </form>
      </section>

      <section id="panel-practice" class="panel hidden" aria-labelledby="practice-heading">
        <h2 id="practice-heading">Practice</h2>
        <div id="practice-root"></div>
        <div class="toolbar">
          <button type="button" class="secondary" id="btn-back-exercise">
            New exercise setup
          </button>
        </div>
      </section>

      <section id="panel-progress" class="panel hidden" aria-labelledby="progress-heading">
        <h2 id="progress-heading">Progress</h2>
        <div id="progress-root"></div>
        <button type="button" class="secondary" id="btn-close-progress">Close</button>
      </section>
    </main>

    <style>
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
    <script src="/app.js" defer></script>
  </body>
</html>
